# S3 credentials secret — referenced by API server and worker deployments.
#
# In production, use sealed-secrets, external-secrets-operator, or
# Vault to inject these values.  This template is for development only.
#
# For Garage, create a key with:
#   garage key create surogates-key
# Then update the access-key and secret-key.
apiVersion: v1
kind: Secret
metadata:
  name: surogates-s3
  namespace: surogates
  labels:
    app: surogates
    component: storage
type: Opaque
stringData:
  access-key: "PLACEHOLDER"
  secret-key: "PLACEHOLDER"
  endpoint: "http://surogates-s3-garage.default.svc:3900"
