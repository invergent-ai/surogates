apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: surogates
  labels:
    app: surogates
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: surogates
      component: api
  template:
    metadata:
      labels:
        app: surogates
        component: api
    spec:
      serviceAccountName: surogates-api
      containers:
        - name: api
          image: ghcr.io/invergent-ai/surogates:latest
          command: ["surogates", "api"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SUROGATES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: surogates-db
                  key: url
            - name: SUROGATES_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: surogates-redis
                  key: url
            - name: SUROGATES_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: surogates-jwt
                  key: secret
            # Storage backend: S3 (Garage).
            # The API server has tenant-wide S3 access for skills, memory,
            # and workspace file browsing.
            - name: SUROGATES_STORAGE_BACKEND
              value: "s3"
            - name: SUROGATES_STORAGE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: surogates-s3
                  key: endpoint
            - name: SUROGATES_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: surogates-s3
                  key: access-key
            - name: SUROGATES_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: surogates-s3
                  key: secret-key
            - name: SUROGATES_LOG_LEVEL
              value: "INFO"
          volumeMounts:
            # Platform skills — read-only, baked into container or ConfigMap.
            # Used by GET /v1/skills to include platform-level skills.
            - name: platform-skills
              mountPath: /etc/surogates/skills
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: platform-skills
          configMap:
            name: platform-skills
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: surogates
spec:
  selector:
    app: surogates
    component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
