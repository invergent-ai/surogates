apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: surogates
  labels:
    app: surogates
    component: worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: surogates
      component: worker
  template:
    metadata:
      labels:
        app: surogates
        component: worker
    spec:
      serviceAccountName: surogates-worker
      containers:
        - name: worker
          image: ghcr.io/invergent-ai/surogates:latest
          command: ["surogates", "worker"]
          env:
            - name: SUROGATES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: surogates-db
                  key: url
            - name: SUROGATES_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: surogates-redis
                  key: url
            - name: SUROGATES_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: surogates-jwt
                  key: secret
            - name: SUROGATES_WORKER_CONCURRENCY
              value: "50"
            # Sandbox backend: "kubernetes" in production.
            - name: SUROGATES_SANDBOX_BACKEND
              value: "kubernetes"
            - name: SUROGATES_SANDBOX_K8S_NAMESPACE
              value: "surogates"
            # API server URL for harness tool calls (skills, memory).
            - name: SUROGATES_WORKER_API_BASE_URL
              value: "http://api-gateway.surogates.svc:8000"
            - name: SUROGATES_WORKER_USE_API_FOR_HARNESS_TOOLS
              value: "true"
            # Storage backend: S3 (Garage).
            - name: SUROGATES_STORAGE_BACKEND
              value: "s3"
            - name: SUROGATES_STORAGE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: surogates-s3
                  key: endpoint
            - name: SUROGATES_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: surogates-s3
                  key: access-key
            - name: SUROGATES_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: surogates-s3
                  key: secret-key
            # Worker ID from pod name (K8s downward API).
            - name: SUROGATES_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SUROGATES_LOG_LEVEL
              value: "INFO"
          volumeMounts:
            # Platform volumes (read-only, from ConfigMaps).
            - name: platform-policies
              mountPath: /etc/surogates/policies
              readOnly: true
            - name: platform-skills
              mountPath: /etc/surogates/skills
              readOnly: true
            - name: platform-tools
              mountPath: /etc/surogates/tools
              readOnly: true
            - name: platform-mcp
              mountPath: /etc/surogates/mcp
              readOnly: true
            - name: model-metadata
              mountPath: /etc/surogates/model-metadata.json
              subPath: model-metadata.json
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            exec:
              command: ["surogates", "health"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["surogates", "health"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: platform-policies
          configMap:
            name: platform-policies
        - name: platform-skills
          configMap:
            name: platform-skills
        - name: platform-tools
          configMap:
            name: platform-tools
        - name: platform-mcp
          configMap:
            name: platform-mcp
        - name: model-metadata
          configMap:
            name: model-metadata
