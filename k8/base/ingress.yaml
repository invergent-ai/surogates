apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surogates
  namespace: surogates
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - surogates.example.com
      secretName: surogates-tls
  rules:
    - host: surogates.example.com
      http:
        paths:
          # REST API + web SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  name: http
