apiVersion: apps/v1
kind: Deployment
metadata:
  name: channel-slack
  namespace: surogates
  labels:
    app: surogates
    component: channel
    channel: slack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surogates
      component: channel
      channel: slack
  template:
    metadata:
      labels:
        app: surogates
        component: channel
        channel: slack
    spec:
      serviceAccountName: surogates-api
      containers:
        - name: channel
          image: ghcr.io/invergent-ai/surogates:latest
          command: ["surogates", "channel", "slack"]
          env:
            - name: SUROGATES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: surogates-db
                  key: url
            - name: SUROGATES_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: surogates-redis
                  key: url
            - name: SUROGATES_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: surogates-jwt
                  key: secret
            - name: SUROGATES_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: surogates-slack
                  key: bot-token
            - name: SUROGATES_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: surogates-slack
                  key: app-token
            - name: SUROGATES_LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
