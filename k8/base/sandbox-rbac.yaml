# RBAC for sandbox pods.
# Sandbox pods have NO K8s API access — minimal ServiceAccount.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: surogates-sandbox
  namespace: surogates
  labels:
    app: surogates
    component: sandbox
---
# No Role/RoleBinding — the sandbox ServiceAccount has zero permissions.
# The pod cannot list pods, read secrets, or interact with the K8s API.
