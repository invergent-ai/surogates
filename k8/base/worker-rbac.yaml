# RBAC for worker pods.
# Workers need to create/delete sandbox pods and their S3 credential secrets.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: surogates-worker
  namespace: surogates
  labels:
    app: surogates
    component: worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: surogates-worker
  namespace: surogates
  labels:
    app: surogates
    component: worker
rules:
  # Manage sandbox pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Execute commands inside sandbox pods
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Manage session-scoped S3 credential secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: surogates-worker
  namespace: surogates
  labels:
    app: surogates
    component: worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: surogates-worker
subjects:
  - kind: ServiceAccount
    name: surogates-worker
    namespace: surogates
