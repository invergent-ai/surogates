{{- if .Values.api.enabled }}
{{- $fullname := include "surogates.fullname" . -}}
{{- $component := "api" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-api
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "surogates.componentSelector" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "surogates.fullLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      serviceAccountName: {{ $fullname }}-api
      {{- if .Values.platformSkills }}
      {{- if not (or .Values.platformSkillsAuth.accessKeyId .Values.platformSkillsAuth.credentialsSecretRef) }}
      {{- fail "platformSkillsAuth: either accessKeyId (inline) or credentialsSecretRef (BYO) is required when platformSkills is non-empty" }}
      {{- end }}
      {{- $lakefsSecret := .Values.platformSkillsAuth.credentialsSecretRef | default (printf "%s-lakefs" $fullname) }}
      initContainers:
        # Download each platform skill from its lakeFS repository into
        # the shared emptyDir volume.  Runs to completion before the
        # api container starts, so /etc/surogates/skills is always
        # populated.  lakeFS is a git-like VCS for object storage — it
        # handles the binary assets (templates, PDFs, fonts) that a
        # plain ConfigMap or git clone cannot.
        - name: fetch-platform-skills
          image: {{ .Values.platformSkillsAuth.image | default "ghcr.io/invergent-ai/surogate-hub:latest" | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              {{- range .Values.platformSkills }}
              echo ">> Cloning skill '{{ .name }}' from lakefs://{{ .repo }}/{{ .ref | default "main" }}/"
              rm -rf /skills/{{ .name }}
              lakectl local clone "lakefs://{{ .repo }}/{{ .ref | default "main" }}/" /skills/{{ .name }}
              {{- end }}
              echo ">> Platform skills ready:"
              ls -la /skills
          env:
            # endpoint is surfaced via `required` so a misconfigured
            # chart fails at `helm template` time instead of at pod-start
            # with an opaque "authentication failed" from the lakeFS
            # server.  Credentials resolve from either the inline Secret
            # (rendered by secrets.yaml from platformSkillsAuth.accessKeyId
            # / secretAccessKey) or a pre-existing BYO Secret named by
            # platformSkillsAuth.credentialsSecretRef.
            - name: LAKECTL_SERVER_ENDPOINT_URL
              value: {{ required "platformSkillsAuth.endpoint is required when platformSkills is non-empty" .Values.platformSkillsAuth.endpoint | quote }}
            - name: LAKECTL_CREDENTIALS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $lakefsSecret | quote }}
                  key: access-key-id
            - name: LAKECTL_CREDENTIALS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $lakefsSecret | quote }}
                  key: secret-access-key
          volumeMounts:
            - name: platform-skills
              mountPath: /skills
      {{- end }}
      containers:
        - name: api
          image: {{ include "surogates.image" (dict "root" . "name" "api") | quote }}
          imagePullPolicy: {{ include "surogates.imagePullPolicy" . }}
          command: ["surogates", "api"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SUROGATES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-db
                  key: url
            - name: SUROGATES_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-redis
                  key: url
            - name: SUROGATES_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-jwt
                  key: secret
            - name: SUROGATES_DB_POOL_SIZE
              value: {{ .Values.db.poolSize | quote }}
            - name: SUROGATES_DB_POOL_OVERFLOW
              value: {{ .Values.db.poolOverflow | quote }}
            - name: SUROGATES_STORAGE_BACKEND
              value: {{ .Values.storage.backend | quote }}
            {{- if eq .Values.storage.backend "s3" }}
            - name: SUROGATES_STORAGE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-s3
                  key: endpoint
            - name: SUROGATES_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-s3
                  key: access-key
            - name: SUROGATES_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-s3
                  key: secret-key
            {{- end }}
            {{- if .Values.org.id }}
            - name: SUROGATES_ORG_ID
              value: {{ .Values.org.id | quote }}
            {{- end }}
            - name: SUROGATES_AGENT_ID
              value: {{ include "surogates.agentId" . | quote }}
            # LLM model is consumed by the API at session-create time
            # (POST /v1/sessions stores ``settings.llm.model`` on the
            # session row, which the worker then uses to dispatch).
            # Without this, ``LLMSettings.model`` falls back to its
            # Pydantic default and every session is created with the
            # wrong model regardless of what the worker is configured
            # to use.
            - name: SUROGATES_LLM_MODEL
              value: {{ .Values.llm.model | quote }}
            {{- if .Values.llm.provider }}
            - name: SUROGATES_LLM_PROVIDER
              value: {{ .Values.llm.provider | quote }}
            {{- end }}
            {{- if .Values.llm.baseUrl }}
            - name: SUROGATES_LLM_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            {{- end }}
            {{- if .Values.llm.apiKey }}
            - name: SUROGATES_LLM_API_KEY
              value: {{ .Values.llm.apiKey | quote }}
            {{- end }}
            - name: SUROGATES_LLM_TEMPERATURE
              value: {{ .Values.llm.temperature | quote }}
            {{- if .Values.llm.maxTokens }}
            - name: SUROGATES_LLM_MAX_TOKENS
              value: {{ .Values.llm.maxTokens | quote }}
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: SUROGATES_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          {{- if .Values.platformSkills }}
          volumeMounts:
            - name: platform-skills
              mountPath: /etc/surogates/skills
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if .Values.platformSkills }}
      volumes:
        # Populated by the fetch-platform-skills init container and
        # mounted read-only into the api container at
        # /etc/surogates/skills.  emptyDir is tmpfs-backed on most
        # clusters, so clones live in memory and vanish with the pod.
        - name: platform-skills
          emptyDir: {}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-api
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  selector:
    {{- include "surogates.componentSelector" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: http
{{- end }}
