{{- if .Values.ingress.enabled }}
{{- $fullname := include "surogates.fullname" . -}}
{{- $hostname := include "surogates.hostname" . -}}
{{- $tlsSecretName := default (printf "%s-tls" $fullname) .Values.ingress.tls.secretName -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $hostname }}
      secretName: {{ $tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ $hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-api
                port:
                  name: http
{{- end }}
