{{- if .Values.mcpProxy.enabled }}
{{- $fullname := include "surogates.fullname" . -}}
{{- $component := "mcp-proxy" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-mcp-proxy
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.mcpProxy.replicas }}
  selector:
    matchLabels:
      {{- include "surogates.componentSelector" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "surogates.fullLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      containers:
        - name: mcp-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["surogates", "mcp-proxy"]
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: SUROGATES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-db
                  key: url
            - name: SUROGATES_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-redis
                  key: url
            - name: SUROGATES_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-jwt
                  key: secret
            {{- if .Values.encryptionKey }}
            - name: SUROGATES_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-credential-key
                  key: key
            {{- end }}
            - name: SUROGATES_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          {{- if .Values.platformMcp }}
          volumeMounts:
            - name: platform-mcp
              mountPath: /etc/surogates/mcp
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.mcpProxy.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      {{- if .Values.platformMcp }}
      volumes:
        - name: platform-mcp
          configMap:
            name: {{ $fullname }}-platform-mcp
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-mcp-proxy
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  selector:
    {{- include "surogates.componentSelector" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: 8001
      targetPort: http
      protocol: TCP
{{- end }}
