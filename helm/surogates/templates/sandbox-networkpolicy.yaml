{{- $fullname := include "surogates.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-sandbox-isolation
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "surogates.componentSelector" (dict "root" . "component" "sandbox") | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress

  ingress:
    # Allow K8s exec API from the worker.
    - from:
        - podSelector:
            matchLabels:
              {{- include "surogates.componentSelector" (dict "root" . "component" "worker") | nindent 14 }}

  egress:
    # Allow DNS resolution (kube-dns).
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    {{- if .Values.mcpProxy.enabled }}
    # Allow traffic to the MCP proxy service.
    - to:
        - podSelector:
            matchLabels:
              {{- include "surogates.componentSelector" (dict "root" . "component" "mcp-proxy") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8001
    {{- end }}

    # Allow traffic to Garage S3 (s3fs sidecar mount).
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: garage
      ports:
        - protocol: TCP
          port: 3900
