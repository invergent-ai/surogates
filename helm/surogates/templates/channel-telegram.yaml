{{- if .Values.channels.telegram.enabled }}
{{- $fullname := include "surogates.fullname" . -}}
{{- $component := "channel-telegram" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-channel-telegram
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" $component) | nindent 4 }}
    channel: telegram
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "surogates.componentSelector" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "surogates.fullLabels" (dict "root" . "component" $component) | nindent 8 }}
        channel: telegram
    spec:
      serviceAccountName: {{ $fullname }}-api
      containers:
        - name: channel
          image: {{ include "surogates.image" (dict "root" . "name" "api") | quote }}
          imagePullPolicy: {{ include "surogates.imagePullPolicy" . }}
          command: ["surogates", "channel", "telegram"]
          env:
            - name: SUROGATES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-db
                  key: url
            - name: SUROGATES_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-redis
                  key: url
            - name: SUROGATES_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-jwt
                  key: secret
            - name: SUROGATES_TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-telegram
                  key: bot-token
            - name: SUROGATES_AGENT_ID
              value: {{ include "surogates.agentId" . | quote }}
            - name: SUROGATES_API_WEB_URL
              value: {{ printf "https://%s" (include "surogates.hostname" .) | quote }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: SUROGATES_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: SUROGATES_HEALTH_PORT
              value: {{ .Values.healthPort | quote }}
          ports:
            - name: health
              containerPort: {{ .Values.healthPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
{{- end }}
