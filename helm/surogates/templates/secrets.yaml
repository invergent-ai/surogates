{{- $fullname := include "surogates.fullname" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-db
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ .Values.db.url | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-redis
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ .Values.redis.url | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-jwt
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ .Values.auth.jwtSecret | quote }}
---
{{- if and (eq .Values.storage.backend "s3") .Values.storage.accessKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-s3
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
type: Opaque
stringData:
  endpoint: {{ .Values.storage.endpoint | quote }}
  access-key: {{ .Values.storage.accessKey | quote }}
  secret-key: {{ .Values.storage.secretKey | quote }}
---
{{- end }}
{{- if .Values.channels.slack.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-slack
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
type: Opaque
stringData:
  app-token: {{ .Values.channels.slack.appToken | quote }}
  bot-token: {{ .Values.channels.slack.botToken | quote }}
---
{{- end }}
{{- if .Values.channels.telegram.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-telegram
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
type: Opaque
stringData:
  bot-token: {{ required "channels.telegram.botToken is required when telegram is enabled" .Values.channels.telegram.botToken | quote }}
  {{- if .Values.channels.telegram.webhookSecret }}
  webhook-secret: {{ .Values.channels.telegram.webhookSecret | quote }}
  {{- end }}
---
{{- end }}
{{- if .Values.encryptionKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-credential-key
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
type: Opaque
stringData:
  key: {{ .Values.encryptionKey | quote }}
---
{{- end }}
{{- if and .Values.platformSkillsAuth.accessKeyId (not .Values.platformSkillsAuth.credentialsSecretRef) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-lakefs
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key-id: {{ .Values.platformSkillsAuth.accessKeyId | quote }}
  secret-access-key: {{ required "platformSkillsAuth.secretAccessKey is required when accessKeyId is set" .Values.platformSkillsAuth.secretAccessKey | quote }}
{{- end }}
