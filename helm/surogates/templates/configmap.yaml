{{- $fullname := include "surogates.fullname" . -}}
{{- /*
  Platform skills are no longer a ConfigMap — they're cloned from per-skill
  git repos by an init container (see api-deployment.yaml).  ConfigMaps
  can't carry binary assets (templates, fonts, PDFs) and have a 1 MiB
  ceiling; init-container clone has neither limit.
*/ -}}
{{- if .Values.platformPolicies }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-platform-policies
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.platformPolicies }}
  {{ $key }}: |
    {{- $value | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- if .Values.platformMcp }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-platform-mcp
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.platformMcp }}
  {{ $key }}: |
    {{- $value | nindent 4 }}
  {{- end }}
---
{{- end }}
