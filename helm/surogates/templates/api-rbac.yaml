{{- if .Values.api.enabled }}
{{- $fullname := include "surogates.fullname" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-api
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" "api") | nindent 4 }}
{{- if eq .Values.browser.backend "kubernetes" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-api-browser
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" "api") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "get", "list"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["delete", "get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-api-browser
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" "api") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-api-browser
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}-api
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
