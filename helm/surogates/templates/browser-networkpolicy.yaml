{{- $browser := default dict .Values.browser -}}
{{- $fullname := include "surogates.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-browser-isolation
  labels:
    {{- include "surogates.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: surogates-browser
  policyTypes:
    - Egress
    - Ingress

  ingress:
    # Worker drives browser tools over the REST service.
    - from:
        - podSelector:
            matchLabels:
              {{- include "surogates.componentSelector" (dict "root" . "component" "worker") | nindent 14 }}
    # API server proxies live view/control traffic in Phase C.
    - from:
        - podSelector:
            matchLabels:
              {{- include "surogates.componentSelector" (dict "root" . "component" "api") | nindent 14 }}

  egress:
    # Allow DNS resolution (kube-dns).
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Chromium must reach arbitrary public websites.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            {{- with $browser.blockedCidrs }}
            except:
              {{- toYaml . | nindent 14 }}
            {{- end }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
