{{- if .Values.worker.enabled }}
{{- $fullname := include "surogates.fullname" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-worker
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" "worker") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-worker
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" "worker") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # kubernetes-asyncio's WsApiClient calls connect_GET_namespaced_pod_exec
  # which is verb=get; kubectl exec (POST) is verb=create.  Grant both so
  # whichever client the worker uses works.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-worker
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" "worker") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-worker
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}-worker
    namespace: {{ .Release.Namespace }}
{{- end }}
