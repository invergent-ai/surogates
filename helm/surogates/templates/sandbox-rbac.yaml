{{- $fullname := include "surogates.fullname" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-sandbox
  labels:
    {{- include "surogates.fullLabels" (dict "root" . "component" "sandbox") | nindent 4 }}
---
# No Role/RoleBinding — the sandbox ServiceAccount has zero permissions.
# The pod cannot list pods, read secrets, or interact with the K8s API.
