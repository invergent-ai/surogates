# -- Agent identity
agent:
  # URL-safe slug — used in resource names, labels, and subdomain.
  slug: "default"
  # Base domain.  Agent is reachable at {slug}.{domain}.
  domain: "densemax.local"
  # Persisted on every session; falls back to slug when empty.
  id: "default"

# -- Container images
#
# Canonical defaults are baked into the chart; nothing here is required.
# Each workload has its own image — they diverge in heavy dependencies:
#   api     — pure Python (FastAPI). Reused by channel adapters and mcp-proxy.
#   worker  — Python + Node + bubblewrap + srt (OS-level sandbox).
#   s3fs    — s3fs-fuse sidecar injected into sandbox pods.
#
# Defaults (hardcoded in templates/_helpers.tpl):
#   api     → ghcr.io/invergent-ai/surogates-api:latest
#   worker  → ghcr.io/invergent-ai/surogates-worker:latest
#   s3fs    → ghcr.io/invergent-ai/surogates-s3fs:latest
#
# Override only what you need (full or partial — just `tag` works):
#   images:
#     api:
#       tag: v1.2.3
#     worker:
#       repository: ghcr.io/myorg/custom-worker
#       tag: v1.2.3
images: {}
  # pullPolicy: IfNotPresent

# -- Database
db:
  url: "postgresql+asyncpg://surogates:surogates@postgres:5432/surogates"
  poolSize: 10
  poolOverflow: 20

# -- Redis
redis:
  url: "redis://redis:6379/0"

# -- Auth
auth:
  jwtSecret: "change-me-in-production"

# -- LLM provider
llm:
  model: "gpt-4o"
  provider: ""
  baseUrl: ""
  apiKey: ""
  temperature: 0.7
  maxTokens: ""

# -- API server
api:
  # Disable when running the API process outside the cluster (e.g. local dev).
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- Worker
worker:
  # Disable when running the worker process outside the cluster (e.g. local dev).
  enabled: true
  replicas: 5
  concurrency: 50
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

# -- Worker autoscaling
autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  targetCPU: 70

# -- Sandbox
sandbox:
  backend: "process"
  srtEnabled: false
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  k8sNamespace: ""
  k8sServiceAccount: ""  # defaults to "{{ fullname }}-sandbox" — the SA sandbox-rbac.yaml creates
  k8sPodReadyTimeout: 60
  k8sExecutorPath: "/usr/local/bin/tool-executor"
  k8sS3Endpoint: ""

# -- Storage (S3-compatible)
storage:
  backend: "local"
  endpoint: ""
  accessKey: ""
  secretKey: ""
  region: ""

# -- MCP proxy
mcpProxy:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Channel adapters
# Behavioral settings (requireMention, allowBots, replyInThread, etc.)
# are injected via extraEnv — the same mechanism used for governance,
# saga, and all other agent-specific configuration.
channels:
  slack:
    enabled: false
    appToken: ""
    botToken: ""

  telegram:
    enabled: false
    botToken: ""

  website:
    enabled: false
    # Visitors authenticate via publishable_key + Origin at bootstrap.
    # Rotate by redeploying with a fresh value (the secret only ever
    # appears in the bootstrap Authorization header).
    publishableKey: ""
    # Comma-separated list of exact-match origins (scheme://host[:port]).
    # No wildcards — every embedding domain must be enumerated.
    allowedOrigins: ""
    # Visitor message cap.  Anonymous browser visitors warrant a
    # tighter ceiling than authenticated channels.  ``0`` = "no cap".
    sessionMessageCap: 0

# -- Ingress
# -- Agent-specific environment variables (governance, saga, etc.)
# Injected into worker and API pods.  Keys are env-var names, values
# are their string values.  Populated by the platform from the agent's
# persisted env_vars when deploying via Helm.
extraEnv: {}

# -- Tool-specific secrets (env vars on the worker Deployment)
# Only keys with non-empty values are emitted.
tools:
  tavilyApiKey: ""

ingress:
  enabled: true
  # Leave empty to let the cluster's default IngressClass pick it up.
  # Override (e.g. "traefik", "nginx") only when multiple controllers
  # run and you need to target one explicitly.
  className: ""
  annotations: {}
  tls:
    enabled: true
    # Empty = auto-generate as {release}-tls.
    secretName: ""

# -- Background jobs (K8s CronJobs)
jobs:
  cleanupSessions:
    enabled: true
    schedule: "0 */6 * * *"    # every 6 hours
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  resetIdleSessions:
    enabled: false
    schedule: "*/5 * * * *"    # every 5 minutes
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi

# -- Session reset policy (only used when jobs.resetIdleSessions.enabled)
sessionReset:
  mode: "idle"                 # "idle", "daily", "both", "none"
  idleMinutes: 1440            # 24 hours
  atHour: 4                    # daily reset hour (0-23)
  flushMaxIterations: 8
  flushMaxRetries: 3
  notify: true
  notifyExcludeChannels: "webhook"

# -- Platform skills
#
# Each skill lives in its own lakeFS repository and is downloaded by an
# init container on the API pod at startup using `lakectl fs download`.
# Skills can include binary assets (templates, PDFs, fonts) — lakeFS is
# git-like but backed by object storage, so there is no size or
# content-type limit.
#
# Entries:
#   name: directory name used under /etc/surogates/skills/{name}
#   repo: lakeFS repository name (bare — no scheme, no host)
#   ref:  branch, tag, or commit SHA (optional — defaults to "main")
#
# Pin to a tag or commit SHA in production; unpinned branch refs drift
# and hurt reproducibility across pod restarts.
platformSkills: []
#   - name: pptx_builder
#     repo: pptx-builder-skill
#     ref: v1.2.0
#   - name: sql_writer
#     repo: sql-writer-skill
#     ref: main

# -- Auth for lakeFS-backed platform-skill repositories
#
# `endpoint` is the lakeFS server URL (e.g. https://lakefs.example.com).
#
# Credentials can be supplied two ways:
#
#   1. Inline (recommended for platform-managed releases): set
#      `accessKeyId` and `secretAccessKey`.  The chart renders a
#      `{release}-lakefs` Secret and the init container consumes it.
#
#   2. BYO Secret: leave the inline fields empty and set
#      `credentialsSecretRef` to the name of a pre-existing Secret
#      carrying `access-key-id` / `secret-access-key`.
#
# Both paths result in LAKECTL_CREDENTIALS_* env vars on the init
# container.
#
# `image` must ship `lakectl` on the PATH.  The default is the internal
# `surogate-hub` image which also carries other operator tooling.
platformSkillsAuth:
  endpoint: ""
  accessKeyId: ""
  secretAccessKey: ""
  credentialsSecretRef: ""
  image: "ghcr.io/invergent-ai/surogate-hub:latest"

# -- Platform policies and MCP config (still ConfigMap-mounted)
# Each key becomes a file.  Leave empty to skip.  These are small text
# configs, so the ConfigMap size limit is not a concern.
platformPolicies: {}
platformMcp: {}

# -- Org identity
org:
  id: ""

# -- Encryption (Fernet key for credential vault)
encryptionKey: ""

# -- Logging
logLevel: "INFO"

# -- Side-car health HTTP port for worker and channel adapter pods.
# The API and mcp-proxy services serve /health on their primary port
# and ignore this value.
healthPort: 8080
