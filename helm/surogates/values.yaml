# -- Agent identity
agent:
  # URL-safe slug — used in resource names, labels, and subdomain.
  slug: "default"
  # Base domain.  Agent is reachable at {slug}.{domain}.
  domain: "k8s.local"

# -- Container images
#
# Canonical defaults are baked into the chart; nothing here is required.
# Each workload has its own image — they diverge in heavy dependencies:
#   api     — pure Python (FastAPI). Reused by channel adapters and mcp-proxy.
#   worker  — Python + Node + bubblewrap + srt (OS-level sandbox).
#   s3fs    — s3fs-fuse sidecar injected into sandbox pods.
#
# Defaults (hardcoded in templates/_helpers.tpl):
#   api     → ghcr.io/invergent-ai/surogates-api:latest
#   worker  → ghcr.io/invergent-ai/surogates-worker:latest
#   s3fs    → ghcr.io/invergent-ai/surogates-s3fs:latest
#
# Override only what you need (full or partial — just `tag` works):
#   images:
#     api:
#       tag: v1.2.3
#     worker:
#       repository: ghcr.io/myorg/custom-worker
#       tag: v1.2.3
images: {}
  # pullPolicy: IfNotPresent

# -- Database
db:
  url: "postgresql+asyncpg://surogates:surogates@postgres:5432/surogates"
  poolSize: 10
  poolOverflow: 20

# -- Redis
redis:
  url: "redis://redis:6379/0"

# -- Auth
auth:
  jwtSecret: "change-me-in-production"

# -- LLM provider
llm:
  model: "gpt-4o"
  provider: ""
  baseUrl: ""
  apiKey: ""
  temperature: 0.7
  maxTokens: ""

# -- API server
api:
  # Disable when running the API process outside the cluster (e.g. local dev).
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- Worker
worker:
  # Disable when running the worker process outside the cluster (e.g. local dev).
  enabled: true
  replicas: 5
  concurrency: 50
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

# -- Worker autoscaling
autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 20
  targetCPU: 70

# -- Sandbox
sandbox:
  backend: "process"
  srtEnabled: false
  k8sNamespace: ""
  k8sServiceAccount: "surogates-sandbox"
  k8sPodReadyTimeout: 60
  k8sExecutorPath: "/usr/local/bin/tool-executor"
  k8sS3Endpoint: ""

# -- Storage (S3-compatible)
storage:
  backend: "local"
  endpoint: ""
  accessKey: ""
  secretKey: ""
  region: ""

# -- MCP proxy
mcpProxy:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Channel adapters
channels:
  slack:
    enabled: false
    appToken: ""
    botToken: ""
    requireMention: true
    freeResponseChannels: ""
    allowBots: "none"
    replyInThread: true
    replyBroadcast: false

# -- Ingress
ingress:
  enabled: true
  # Leave empty to let the cluster's default IngressClass pick it up.
  # Override (e.g. "traefik", "nginx") only when multiple controllers
  # run and you need to target one explicitly.
  className: ""
  annotations: {}
  tls:
    enabled: true
    # Empty = auto-generate as {release}-tls.
    secretName: ""

# -- Background jobs (K8s CronJobs)
jobs:
  cleanupSessions:
    enabled: true
    schedule: "0 */6 * * *"    # every 6 hours
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  resetIdleSessions:
    enabled: false
    schedule: "*/5 * * * *"    # every 5 minutes
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi

# -- Session reset policy (only used when jobs.resetIdleSessions.enabled)
sessionReset:
  mode: "idle"                 # "idle", "daily", "both", "none"
  idleMinutes: 1440            # 24 hours
  atHour: 4                    # daily reset hour (0-23)
  flushMaxIterations: 8
  flushMaxRetries: 3
  notify: true
  notifyExcludeChannels: "webhook"

# -- Platform config (contents mounted as ConfigMaps)
# Each key becomes a file.  Leave empty to skip.
platformSkills: {}
platformPolicies: {}
platformTools: {}
platformMcp: {}
modelMetadata: {}

# -- Org identity
org:
  id: ""

# -- Encryption (Fernet key for credential vault)
encryptionKey: ""

# -- Logging
logLevel: "INFO"
