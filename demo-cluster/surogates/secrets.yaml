# Dev cluster secrets — NOT for production.
# In production, use sealed-secrets or external-secrets-operator.
---
apiVersion: v1
kind: Secret
metadata:
  name: surogates-db
  namespace: surogates
type: Opaque
stringData:
  url: "postgresql+asyncpg://surogates:surogates@surogates-db-postgresql.default.svc:5432/surogates"
---
apiVersion: v1
kind: Secret
metadata:
  name: surogates-redis
  namespace: surogates
type: Opaque
stringData:
  url: "redis://surogates-redis-master.default.svc:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: surogates-jwt
  namespace: surogates
type: Opaque
stringData:
  secret: "dev-secret-do-not-use-in-production"
---
# Garage S3 credentials.
# After Garage is installed, create a key with:
#   kubectl exec -ti surogates-s3-garage-0 -- /garage key create surogates-key
# Then update the access-key and secret-key below with the output.
apiVersion: v1
kind: Secret
metadata:
  name: surogates-s3
  namespace: surogates
type: Opaque
stringData:
  # Placeholder — replace with actual Garage key after post-install setup.
  access-key: "GK_PLACEHOLDER_RUN_GARAGE_KEY_CREATE"
  secret-key: "SK_PLACEHOLDER_RUN_GARAGE_KEY_CREATE"
  endpoint: "http://surogates-s3-garage.default.svc:3900"
