name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  wheel:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  images:
    needs: npm
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: api
            name: surogates-api
          - dir: worker
            name: surogates-worker
          - dir: sandbox
            name: surogates-agent-sandbox
          - dir: s3fs
            name: surogates-s3fs
          - dir: browser
            name: surogates-agent-browser
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Persistent per-image builder on the self-hosted runner. Keeping
          # the builder (cleanup: false) preserves its internal layer cache
          # across runs, so we don't pay a slow local cache export each build.
          name: surogates-builder-${{ matrix.dir }}
          driver: docker-container
          cleanup: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/invergent-ai/${{ matrix.name }}:${{ steps.version.outputs.value }}
            ghcr.io/invergent-ai/${{ matrix.name }}:latest
          # No cache-from/cache-to: the persistent builder above retains its
          # layer cache between runs on the host, which is faster than
          # serializing the whole cache to a local directory.

  npm:
    runs-on: self-hosted
    permissions:
      contents: read
    env:
      # Self-hosted runners cannot produce npm provenance: npmjs.org only
      # accepts provenance bundles built from "github-hosted" runners.
      NPM_CONFIG_PROVENANCE: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@invergent"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm -r --filter './sdk/*' --if-present run build

      - name: Publish SDK packages
        env:
          # OIDC trusted publishing requires github-hosted runners, so on
          # self-hosted we authenticate with a long-lived npm automation token.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-sdk-packages.mjs --version="${GITHUB_REF_NAME#v}"

  release:
    needs:
      - wheel
      - images
    runs-on: self-hosted
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
