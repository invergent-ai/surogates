name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  images:
    needs: npm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: api
            name: surogates-api
          - dir: worker
            name: surogates-worker
          - dir: sandbox
            name: surogates-agent-sandbox
          - dir: s3fs
            name: surogates-s3fs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/invergent-ai/${{ matrix.name }}:${{ steps.version.outputs.value }}
            ghcr.io/invergent-ai/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.dir }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dir }}

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@invergent-ai"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify SDK packages
        run: |
          ruby scripts/release_workflow_test.rb
          node --test scripts/publish-sdk-packages.test.mjs
          pnpm -r --filter './sdk/*' --if-present run typecheck
          pnpm -r --filter './sdk/*' --if-present run test
          pnpm -r --filter './sdk/*' --if-present run build

      - name: Publish SDK packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-sdk-packages.mjs
