apiVersion: v1
kind: Service
metadata:
  name: camofox-browser
  labels:
    app.kubernetes.io/name: camofox-browser
    app.kubernetes.io/component: browser
    app.kubernetes.io/part-of: surogates
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: camofox-browser
    app.kubernetes.io/component: browser
  ports:
    - name: http
      port: 9377
      targetPort: http
      protocol: TCP
    - name: novnc
      port: 6080
      targetPort: novnc
      protocol: TCP
