# NodePort service for Garage S3 API — dev access from host.
# Applied separately after Helm install so local API server / worker
# can reach Garage at localhost:33900.
apiVersion: v1
kind: Service
metadata:
  name: surogates-s3-garage-nodeport
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/instance: surogates-s3
spec:
  type: NodePort
  ports:
    - port: 3900
      targetPort: 3900
      nodePort: 30900
      protocol: TCP
      name: s3-api
  selector:
    app.kubernetes.io/name: garage
    app.kubernetes.io/instance: surogates-s3
